name: ML Deploy

on:
  workflow_run:
    workflows: ["ML Build Push"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker Hub image tag to deploy (git SHA — find in Actions → ML Build Push)'
        required: true

permissions:
  contents: read

env:
  APP_NAME: triton-text-classifier
  K8S_NAMESPACE: ${{ github.event.repository.name }}
  DEPLOYMENT_NAME: triton

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, dgx]

    steps:
      - uses: actions/checkout@v5

      - name: Resolve image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          else
            IMAGE_TAG="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${APP_NAME}" >> "$GITHUB_ENV"

      - name: Configure kubectl for minikube
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.DGX_MINIKUBE_KUBECONFIG }}" | base64 -d > ~/.kube/config
          docker network connect minikube "$(hostname)" || true

      - name: Deploy Triton
        run: |
          sed "s|IMAGE_PLACEHOLDER|${DOCKERHUB_IMAGE}:${IMAGE_TAG}|g" k8s/triton.yaml \
            | kubectl --context minikube apply -f -

      - name: Wait for rollout
        run: |
          kubectl --context minikube rollout status deployment/"$DEPLOYMENT_NAME" \
            -n "$K8S_NAMESPACE" \
            --timeout=300s

      - name: Show deployed resources
        if: always()
        run: kubectl --context minikube -n "$K8S_NAMESPACE" get deploy,pods,svc -o wide

      - name: Describe deployment on failure
        if: failure()
        run: |
          kubectl --context minikube -n "$K8S_NAMESPACE" describe deployment "$DEPLOYMENT_NAME"
          kubectl --context minikube -n "$K8S_NAMESPACE" describe pods -l app="$DEPLOYMENT_NAME"
