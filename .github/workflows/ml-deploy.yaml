name: ML Deploy

on:
  workflow_run:
    workflows: ["ML Train"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'ML Train run ID to deploy (find in Actions → ML Train)'
        required: true

permissions:
  contents: read
  actions: read

env:
  APP_NAME: triton-text-classifier
  K8S_NAMESPACE: ${{ github.event.repository.name }}
  DEPLOYMENT_NAME: triton

jobs:
  build-and-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, dgx]

    steps:
      - uses: actions/checkout@v5

      - name: Resolve run ID and image tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RUN_ID="${{ github.event.inputs.run_id }}"
            SHA=$(curl -sf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/${RUN_ID}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['head_sha'])")
          else
            RUN_ID="${{ github.event.workflow_run.id }}"
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${SHA}" >> "$GITHUB_ENV"
          echo "DOCKERHUB_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${APP_NAME}" >> "$GITHUB_ENV"

      - name: Download ONNX model
        uses: actions/download-artifact@v4
        with:
          name: onnx-model
          path: ml/output
          run-id: ${{ env.RUN_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure kubectl for minikube
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.DGX_MINIKUBE_KUBECONFIG }}" | base64 -d > ~/.kube/config
          docker network connect minikube "$(hostname)" || true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull cache for serving image
        run: docker pull "${DOCKERHUB_IMAGE}:latest" || true

      - name: Build Triton serving image
        run: |
          docker build -f ml/Dockerfile.serve \
            --cache-from "${DOCKERHUB_IMAGE}:latest" \
            -t "${DOCKERHUB_IMAGE}:${IMAGE_TAG}" \
            -t "${DOCKERHUB_IMAGE}:latest" \
            .

      - name: Push to Docker Hub
        run: |
          docker push "${DOCKERHUB_IMAGE}:${IMAGE_TAG}"
          docker push "${DOCKERHUB_IMAGE}:latest"

      - name: Deploy Triton
        run: |
          sed "s|IMAGE_PLACEHOLDER|${DOCKERHUB_IMAGE}:${IMAGE_TAG}|g" k8s/triton.yaml \
            | kubectl --context minikube apply -f -

      - name: Wait for rollout
        run: |
          kubectl --context minikube rollout status deployment/"$DEPLOYMENT_NAME" \
            -n "$K8S_NAMESPACE" \
            --timeout=300s

      - name: Show deployed resources
        if: always()
        run: kubectl --context minikube -n "$K8S_NAMESPACE" get deploy,pods,svc -o wide

      - name: Describe deployment on failure
        if: failure()
        run: |
          kubectl --context minikube -n "$K8S_NAMESPACE" describe deployment "$DEPLOYMENT_NAME"
          kubectl --context minikube -n "$K8S_NAMESPACE" describe pods -l app="$DEPLOYMENT_NAME"
