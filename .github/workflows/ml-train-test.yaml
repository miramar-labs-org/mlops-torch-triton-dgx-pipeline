name: ML Train Test

on:
  push:
    branches: [main]
    paths:
      - ml/train.py
      - ml/test_train.py
      - ml/Dockerfile.train
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, dgx]

    steps:
      - uses: actions/checkout@v5

      - name: Run tests
        run: python3 -m pytest ml/test_train.py -v

      - name: Build training image
        run: docker build -f ml/Dockerfile.train -t ml-trainer:latest .
