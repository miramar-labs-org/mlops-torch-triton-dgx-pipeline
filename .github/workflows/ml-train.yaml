name: ML Train

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Training epochs'
        default: '3'
        required: false
      experiment:
        description: 'MLflow experiment name'
        default: 'text-classifier'
        required: false

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: miramar-platform
  GAR_LOCATION: us-west1
  GAR_REPOSITORY: apps
  APP_NAME: triton-text-classifier
  GKE_CLUSTER_NAME: miramar-shared-gke
  GKE_ZONE: us-west1-a
  K8S_NAMESPACE: ml-serving
  DEPLOYMENT_NAME: triton

jobs:
  train:
    runs-on: ${{ vars.RUNNER_LABELS || 'dgx-spark' }}
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          echo "IMAGE_TAG=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Build training image
        run: docker build -f ml/Dockerfile.train -t ml-trainer:latest .

      - name: Train model
        run: |
          mkdir -p ml/output
          docker run --rm --gpus all \
            --add-host host.docker.internal:host-gateway \
            -v "$GITHUB_WORKSPACE/ml/output:/output" \
            -e MLFLOW_TRACKING_URI="${{ vars.MLFLOW_TRACKING_URI }}" \
            -e MLFLOW_EXPERIMENT_NAME="${{ github.event.inputs.experiment }}" \
            -e EPOCHS="${{ github.event.inputs.epochs }}" \
            ml-trainer:latest

      - name: Build Triton serving image
        run: |
          docker build -f ml/Dockerfile.serve \
            -t "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:latest" \
            -t "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:${IMAGE_TAG}" \
            .

      - name: Push to GAR
        run: |
          docker push "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:latest"
          docker push "${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:${IMAGE_TAG}"

  deploy-triton:
    needs: [train]
    runs-on: ${{ vars.RUNNER_LABELS || 'dgx-spark' }}
    environment:
      name: gke-ml
      url: https://console.cloud.google.com/kubernetes/workload/overview?project=miramar-platform

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ needs.train.outputs.image_tag }}" >> "$GITHUB_ENV"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_ZONE }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy Triton
        run: |
          IMAGE="${GAR_LOCATION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${APP_NAME}:${IMAGE_TAG}"
          sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/triton.yaml \
            | python3 -c "import sys; docs=sys.stdin.read().split('\n---\n'); print('\n---\n'.join(d for d in docs if 'kind: Namespace' not in d))" \
            | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/"$DEPLOYMENT_NAME" \
            -n "$K8S_NAMESPACE" \
            --timeout=300s

      - name: Show deployed resources
        if: always()
        run: kubectl -n "$K8S_NAMESPACE" get deploy,pods,svc -o wide

      - name: Describe deployment on failure
        if: failure()
        run: |
          kubectl -n "$K8S_NAMESPACE" describe deployment "$DEPLOYMENT_NAME"
          kubectl -n "$K8S_NAMESPACE" describe pods -l app="$DEPLOYMENT_NAME"
